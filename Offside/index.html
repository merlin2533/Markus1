<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offside · Kommunikationsplan</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="print.css" media="print">
  <!-- SheetJS für Excel-Import/-Export (lokal eingebunden → offline lauffähig) -->
  <script src="vendor/xlsx.full.min.js"></script>
</head>
<body>

  <header class="topbar">
    <div class="brand">
      <span class="logo">🛡️</span>
      <div>
        <h1>Offside</h1>
        <span class="tagline">Kommunikationsplan · Behörde</span>
      </div>
    </div>

    <div class="plan-bar">
      <label class="plan-lbl">Plan</label>
      <select id="plan-select" title="Aktiven Plan wählen"></select>
      <button class="ico" id="btn-plan-new" title="Neuer Plan">＋</button>
      <button class="ico" id="btn-plan-dup" title="Plan duplizieren">⧉</button>
      <button class="ico" id="btn-plan-rename" title="Plan umbenennen">✎</button>
      <button class="ico" id="btn-plan-del" title="Plan löschen">🗑</button>
    </div>

    <div class="title-block">
      <div id="plan-titel" class="plan-titel">Kommunikationsplan</div>
      <div id="plan-sub" class="plan-sub"></div>
    </div>
    <span class="demo-flag">DEMO</span>
  </header>

  <div class="toolbar">
    <button class="btn primary" id="btn-add">＋ Element</button>
    <button class="btn" id="btn-connect">🔗 Verbinden</button>
    <span class="sep"></span>
    <button class="btn" id="btn-undo" title="Rückgängig (Strg+Z)">↶</button>
    <button class="btn" id="btn-redo" title="Wiederholen (Strg+Y)">↷</button>
    <span class="sep"></span>
    <button class="btn" id="btn-zoom-out" title="Verkleinern">－</button>
    <button class="btn" id="btn-fit" title="Einpassen">⤢ Fit</button>
    <button class="btn" id="btn-zoom-in" title="Vergrößern">＋</button>
    <span class="sep"></span>
    <span class="grp-lbl">Anordnen:</span>
    <button class="btn" id="btn-layout-hier" title="Swimlanes nach Hierarchie">▤ Hierarchie</button>
    <button class="btn" id="btn-layout-person" title="Swimlanes nach Person/Thema">▤ Person</button>
    <button class="btn ghost" id="btn-layout-clear" title="Bahnen entfernen">✕</button>
    <span class="sep"></span>
    <button class="btn" id="btn-export-xlsx">⬇ Excel</button>
    <button class="btn" id="btn-export-png">🖼 PNG</button>
    <button class="btn" id="btn-print">🖨 Drucken/PDF</button>
    <button class="btn" id="btn-import">⬆ Import</button>
    <input type="file" id="file-import" accept=".xlsx,.xls" hidden>
    <button class="btn ghost" id="btn-reset">↺ DEMO</button>
    <div class="legende" id="legende"></div>
  </div>

  <div class="filterbar">
    <span class="flt-lbl">🔎 Filter</span>
    <input id="flt-text" placeholder="Suchtext …" class="flt-text">
    <select id="flt-aktion"></select>
    <select id="flt-kanal"></select>
    <select id="flt-hier"></select>
    <select id="flt-person"></select>
    <button class="btn ghost" id="flt-clear">Filter zurücksetzen</button>
  </div>

  <main class="layout">
    <section class="canvas-wrap">
      <div class="canvas-scroll" id="chart-scroll">
        <svg id="chart" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
      <div class="canvas-hint">Verschieben: ziehen (Maus/Touch) · Auswählen: klicken · Löschen: <b>Entf</b> · Abwählen: <b>Esc</b> · Zoom: Strg+Mausrad</div>
    </section>

    <aside class="sidebar">
      <nav class="tabs">
        <button class="tab active" data-tab="detail">Detail</button>
        <button class="tab" data-tab="auswertung">Auswertung</button>
        <button class="tab" data-tab="teilnehmer">Teilnehmer</button>
        <button class="tab" data-tab="hierarchie">Hierarchie</button>
        <button class="tab" data-tab="plan">Plan</button>
      </nav>
      <div id="panel" class="panel"></div>
    </aside>
  </main>

  <script src="js/data.js"></script>
  <script src="js/state.js"></script>
  <script src="js/chart.js"></script>
  <script src="js/excel.js"></script>
  <script src="js/image.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
